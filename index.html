<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alberts dinosaur-matematik</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dino-Matematik" />
  <link rel="icon" href="icon.png" />
  <link rel="apple-touch-icon" href="icon.png" />
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.3.1/dist/confetti.browser.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(160deg, #F1F8E9 0%, #DCEDC8 55%, #C5E1A5 100%);
      min-height: 100vh;
      padding: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    /* ── LEVEL-UP MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 16px;
    }
    .modal-box {
      background: white;
      border-radius: 28px;
      padding: 32px 28px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    }
    .modal-badge {
      font-size: 72px;
      margin-bottom: 10px;
      display: block;
      animation: popIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }
    .modal-title {
      font-size: 26px;
      font-weight: bold;
      color: #2E7D32;
      margin-bottom: 8px;
    }
    .modal-sub {
      font-size: 19px;
      color: #444;
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .modal-unlock {
      background: #F1F8E9;
      border: 2px solid #AED581;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 17px;
      color: #33691E;
      line-height: 1.5;
      margin-bottom: 4px;
    }
    .modal-btn {
      background: #43A047;
      color: white;
      border: none;
      border-radius: 16px;
      padding: 16px 36px;
      font-size: 21px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 18px;
      box-shadow: 0 5px 0 #2E7D32;
      transition: transform 0.08s, box-shadow 0.08s;
      display: inline-block;
    }
    .modal-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #2E7D32;
    }
    @keyframes popIn {
      0%   { transform: scale(0.3); opacity: 0; }
      70%  { transform: scale(1.18); }
      100% { transform: scale(1);   opacity: 1; }
    }

    /* ── TOP BAR ── */
    #topBar {
      width: 100%;
      max-width: 700px;
      background: white;
      border-radius: 18px;
      padding: 12px 18px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    #playerInfo {
      display: flex;
      flex-direction: column;
      min-width: 100px;
    }
    #playerNameDisplay {
      font-weight: bold;
      font-size: 17px;
      color: #2E7D32;
    }
    #levelNameDisplay {
      font-size: 13px;
      color: #888;
      margin-top: 2px;
    }
    #xpSection {
      flex: 1;
      min-width: 100px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    #xpLabel { font-size: 13px; color: #666; }
    #xpBarOuter {
      background: #e0e0e0;
      border-radius: 99px;
      height: 16px;
      overflow: hidden;
    }
    #xpBarFill {
      background: linear-gradient(90deg, #43A047, #8BC34A);
      height: 100%;
      width: 0%;
      border-radius: 99px;
      transition: width 0.6s cubic-bezier(0.22,1,0.36,1);
    }
    #streakDisplay {
      font-size: 22px;
      font-weight: bold;
      color: #E65100;
      white-space: nowrap;
    }

    /* ── MAIN CONTAINER ── */
    #mainContainer {
      display: flex;
      flex-direction: row;
      gap: 16px;
      width: 100%;
      max-width: 700px;
      align-items: stretch;
    }

    /* ── QUIZ PANEL ── */
    #quizPanel {
      flex: 1;
      background: white;
      border-radius: 24px;
      padding: 22px 20px 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
    }

    /* ── QUESTION DISPLAY ── */
    #questionDisplay {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 6px 0;
    }
    .q-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 54px;
    }
    .q-op-space {
      min-width: 48px;  /* placeholder to align row 1 with rows 2-3 */
    }
    .q-op {
      font-size: 38px;
      font-weight: bold;
      color: #43A047;
      min-width: 48px;
      text-align: center;
      line-height: 1;
    }
    .q-num {
      font-size: 46px;
      font-weight: bold;
      color: #1B5E20;
      min-width: 56px;
      text-align: right;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .q-dinos {
      display: flex;
      flex-wrap: wrap;
      gap: 1px;
      line-height: 1;
    }
    .q-dino {
      font-size: 26px;
      display: inline-block;
    }
    .q-mark {
      font-size: 52px;
      font-weight: bold;
      color: #1B5E20;
      line-height: 1;
    }
    /* Divider under the second addend */
    .q-divider {
      height: 3px;
      background: #AED581;
      border-radius: 2px;
      margin: 2px 0;
      width: calc(48px + 8px + 56px + 120px); /* op + gap + num + some dino width */
      max-width: 100%;
    }

    /* ── ANSWER DISPLAY ── */
    #answerDisplay {
      font-size: 56px;
      font-weight: bold;
      color: #1B5E20;
      width: 100%;
      text-align: center;
      background: #F1F8E9;
      border-radius: 16px;
      border: 3px solid #AED581;
      padding: 10px 0;
      min-height: 84px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, background 0.15s;
    }
    #answerDisplay.wrong {
      border-color: #EF9A9A;
      background: #FFEBEE;
      animation: shake 0.35s ease;
    }
    #answerDisplay.correct {
      border-color: #A5D6A7;
      background: #E8F5E9;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-10px); }
      60%     { transform: translateX(10px); }
    }

    /* ── FEEDBACK ── */
    #feedbackMsg {
      font-size: 22px;
      font-weight: 600;
      min-height: 30px;
      text-align: center;
      line-height: 1.3;
    }
    #feedbackMsg.correct { color: #2E7D32; }
    #feedbackMsg.wrong   { color: #C62828; }

    /* ── NUMPAD ── */
    #numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 310px;
    }
    .numpad-btn {
      font-size: 30px;
      font-weight: bold;
      padding: 16px 8px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      background: #F1F8E9;
      color: #1B5E20;
      box-shadow: 0 5px 0 #AED581;
      transition: transform 0.08s, box-shadow 0.08s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .numpad-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #AED581;
    }
    .numpad-btn.numpad-del {
      background: #FFF3E0;
      color: #E65100;
      box-shadow: 0 5px 0 #FFCCBC;
      font-size: 24px;
    }
    .numpad-btn.numpad-del:active { box-shadow: 0 1px 0 #FFCCBC; }
    .numpad-btn.numpad-zero {
      grid-column: span 2;
    }
    .numpad-btn.numpad-submit {
      grid-column: span 3;
      background: #43A047;
      color: white;
      box-shadow: 0 5px 0 #2E7D32;
      font-size: 22px;
      padding: 18px;
    }
    .numpad-btn.numpad-submit:active { box-shadow: 0 1px 0 #2E7D32; }
    .numpad-btn.numpad-submit:disabled {
      opacity: 0.4;
      cursor: default;
      transform: none !important;
      box-shadow: 0 5px 0 #2E7D32 !important;
    }

    /* Score */
    #scoreBar {
      font-size: 15px;
      color: #aaa;
      text-align: center;
    }

    /* ── BLACKBOARD ── */
    #blackboardContainer {
      width: 200px;
      flex-shrink: 0;
      background: #1c1c1e;
      border-radius: 18px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.2);
    }
    #blackboardLabel {
      color: #888;
      font-size: 11px;
      text-align: center;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    #blackboardCanvas {
      flex: 1;
      display: block;
      width: 100%;
      min-height: 220px;
      background: #1c1c1e;
      border: 1.5px solid #3a3a3c;
      border-radius: 10px;
      touch-action: none;
      cursor: crosshair;
    }
    #clearBoardBtn {
      background: #2a2a2e;
      color: #aaa;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 7px;
      font-size: 12px;
      cursor: pointer;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 620px) {
      #blackboardContainer { display: none; }
    }
  </style>
</head>
<body>

  <!-- ═══ LEVEL-UP MODAL ═══ -->
  <div id="levelUpModal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div id="levelUpContent"></div>
      <button class="modal-btn" onclick="closeLevelUp()">Videre! 🦖</button>
    </div>
  </div>

  <!-- ═══ TOP BAR ═══ -->
  <div id="topBar">
    <div id="playerInfo">
      <span id="playerNameDisplay">Albert 🦕</span>
      <span id="levelNameDisplay">—</span>
    </div>
    <div id="xpSection">
      <div id="xpLabel">Stjerner: 0 / 15</div>
      <div id="xpBarOuter"><div id="xpBarFill"></div></div>
    </div>
    <div id="streakDisplay">🔥 <span id="streakCount">0</span></div>
  </div>

  <!-- ═══ MAIN CONTAINER ═══ -->
  <div id="mainContainer">

    <!-- Quiz Panel -->
    <div id="quizPanel">
      <div id="questionDisplay">…</div>

      <div id="answerDisplay">?</div>

      <div id="feedbackMsg"></div>

      <div id="numpad">
        <button class="numpad-btn" onclick="numpadPress('1')">1</button>
        <button class="numpad-btn" onclick="numpadPress('2')">2</button>
        <button class="numpad-btn" onclick="numpadPress('3')">3</button>
        <button class="numpad-btn" onclick="numpadPress('4')">4</button>
        <button class="numpad-btn" onclick="numpadPress('5')">5</button>
        <button class="numpad-btn" onclick="numpadPress('6')">6</button>
        <button class="numpad-btn" onclick="numpadPress('7')">7</button>
        <button class="numpad-btn" onclick="numpadPress('8')">8</button>
        <button class="numpad-btn" onclick="numpadPress('9')">9</button>
        <button class="numpad-btn numpad-zero" onclick="numpadPress('0')">0</button>
        <button class="numpad-btn numpad-del"  onclick="numpadDelete()">⌫</button>
        <button class="numpad-btn numpad-submit" id="submitBtn" onclick="checkAnswer()">✓ Svar!</button>
      </div>

      <div id="scoreBar">✅ <span id="correctCount">0</span> &nbsp; ❌ <span id="incorrectCount">0</span></div>
    </div>

    <!-- Blackboard -->
    <div id="blackboardContainer">
      <div id="blackboardLabel">Tegnehjørne</div>
      <canvas id="blackboardCanvas"></canvas>
      <button id="clearBoardBtn" onclick="clearBlackboard()">Ryd</button>
    </div>

  </div>

  <script>
  // ═══════════════════════════════════════════
  // CONSTANTS
  // ═══════════════════════════════════════════
  const STATE_KEY   = 'albertMathState_v1';
  const PLAYER_NAME = 'Albert';
  const DINO        = '🦕';

  // ═══════════════════════════════════════════
  // LEVEL CONFIG  (only addition, ever)
  // ═══════════════════════════════════════════
  // maxNum = max value per addend (sum can be up to 2×maxNum)
  const LEVELS = [
    null, // index 0 unused
    { name: 'Dino-æg 🥚',      badge: '🥚',   xpNext: 15,  maxNum: 2,
      unlockMsg: 'Vi starter med de allermindste tal. Du klarer det, Albert! 🥚' },
    { name: 'Baby-dino 🦕',    badge: '🦕',   xpNext: 30,  maxNum: 3,
      unlockMsg: 'Nu lægger vi op til 3 sammen! Du vokser som en baby-dino! 🦕' },
    { name: 'Lille dino 🦕🦕', badge: '🦕🦕', xpNext: 55,  maxNum: 5,
      unlockMsg: 'Op til 5 og 5! Tæl alle dinosaurerne! 🦕🦕' },
    { name: 'Stor dino 🦖',    badge: '🦖',   xpNext: 90,  maxNum: 7,
      unlockMsg: 'Wow Albert! Nu er du en stor dinosaur — op til 7! 🦖' },
    { name: 'Dino-Konge 👑',   badge: '👑🦖', xpNext: 999, maxNum: 10,
      unlockMsg: 'Du er Alberts Dino-Rige\'s store Konge! Plus op til 10! 👑🦖' }
  ];

  function getLevelCfg(lvl) {
    const idx = Math.max(1, Math.min(lvl, LEVELS.length - 1));
    return LEVELS[idx];
  }

  // ═══════════════════════════════════════════
  // STATE
  // ═══════════════════════════════════════════
  function freshState() {
    return { level: 1, xp: 0, correctTotal: 0, incorrectTotal: 0, streak: 0 };
  }

  let state = freshState();

  function loadState() {
    try {
      const raw = localStorage.getItem(STATE_KEY);
      if (!raw) { state = freshState(); return; }
      state = Object.assign(freshState(), JSON.parse(raw));
    } catch (_) { state = freshState(); }
  }

  function saveState() {
    try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch (_) {}
  }

  // ═══════════════════════════════════════════
  // QUESTION GENERATION
  // ═══════════════════════════════════════════
  let currentQuestion = null;
  let wrongAttempts   = 0;
  let currentInput    = '';
  let blocked         = false; // true while auto-advancing

  function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function generateQuestion() {
    const cfg  = getLevelCfg(state.level);
    const num1 = rand(0, cfg.maxNum);
    const num2 = rand(0, cfg.maxNum);
    return { num1, num2, answer: num1 + num2 };
  }

  // Build the visual dino question HTML
  function buildQuestionHTML(q, revealAnswer) {
    function dinoIcons(n) {
      let html = '';
      for (let i = 0; i < n; i++) {
        html += `<span class="q-dino">${DINO}</span>`;
      }
      return html;
    }

    const answerContent = revealAnswer
      ? `<span class="q-mark" style="color:#43A047">${q.answer}</span>`
      : `<span class="q-mark">?</span>`;

    return `
      <div class="q-row">
        <span class="q-op-space"></span>
        <span class="q-num">${q.num1}</span>
        <span class="q-dinos">${dinoIcons(q.num1)}</span>
      </div>
      <div class="q-row">
        <span class="q-op">+</span>
        <span class="q-num">${q.num2}</span>
        <span class="q-dinos">${dinoIcons(q.num2)}</span>
      </div>
      <div class="q-divider"></div>
      <div class="q-row">
        <span class="q-op">=</span>
        ${answerContent}
      </div>
    `;
  }

  function advanceQuestion() {
    blocked       = false;
    wrongAttempts = 0;
    currentInput  = '';
    setFeedback('', '');
    setAnswerDisplay('?', '');
    enableSubmit(true);

    currentQuestion = generateQuestion();
    document.getElementById('questionDisplay').innerHTML =
      buildQuestionHTML(currentQuestion, false);
  }

  // ═══════════════════════════════════════════
  // NUMPAD INPUT
  // ═══════════════════════════════════════════
  function numpadPress(digit) {
    if (blocked) return;
    if (currentInput.length >= 2) return; // max answer is 20
    currentInput += digit;
    setAnswerDisplay(currentInput, '');
  }

  function numpadDelete() {
    if (blocked) return;
    currentInput = currentInput.slice(0, -1);
    setAnswerDisplay(currentInput || '?', '');
  }

  function setAnswerDisplay(text, cls) {
    const el = document.getElementById('answerDisplay');
    el.textContent = text;
    el.className   = cls;
  }

  function enableSubmit(on) {
    document.getElementById('submitBtn').disabled = !on;
  }

  // ═══════════════════════════════════════════
  // ANSWER CHECKING
  // ═══════════════════════════════════════════
  const CORRECT_MSGS = [
    `Bravo, Albert! 🦖`,
    `Fantastisk! 🌟`,
    `Ja, det er rigtigt! ⭐`,
    `Super flot! 🎉`,
    `Du er skarp som en dino! 🦕`,
    `Korrekt! 🏆`,
    `Ja! Du kan det! 💪`,
    `Dino-point til Albert! 🦕`
  ];

  function checkAnswer() {
    if (blocked || !currentInput) return;
    const n = parseInt(currentInput, 10);
    if (isNaN(n)) return;

    if (n === currentQuestion.answer) {
      handleCorrect();
    } else {
      handleWrong();
    }
  }

  function handleCorrect() {
    state.streak++;
    state.correctTotal++;
    document.getElementById('correctCount').textContent = state.correctTotal;

    setAnswerDisplay(currentInput, 'correct');
    setFeedback(CORRECT_MSGS[Math.floor(Math.random() * CORRECT_MSGS.length)], 'correct');

    confetti({ particleCount: 110, spread: 70, origin: { y: 0.6 } });

    const leveledUp = awardXP(1);
    updateTopBar();
    saveState();

    if (!leveledUp) {
      blocked = true;
      setTimeout(advanceQuestion, 1100);
    }
    // If leveled up, awardXP shows the modal and advanceQuestion is called from closeLevelUp
  }

  function handleWrong() {
    wrongAttempts++;
    state.streak = 0;
    state.incorrectTotal++;
    document.getElementById('incorrectCount').textContent = state.incorrectTotal;

    // Shake animation
    const adEl = document.getElementById('answerDisplay');
    adEl.className = '';
    void adEl.offsetWidth; // reflow to restart animation
    adEl.className = 'wrong';

    currentInput = '';
    updateTopBar();
    saveState();

    if (wrongAttempts >= 2) {
      // Reveal answer
      setFeedback(`Svaret er ${currentQuestion.answer} — se dinosaurerne! 🦕`, 'wrong');
      document.getElementById('questionDisplay').innerHTML =
        buildQuestionHTML(currentQuestion, true);
      enableSubmit(false);
      blocked = true;
      setTimeout(advanceQuestion, 3500);
    } else {
      // First wrong — encourage to try again
      setFeedback('Ikke helt — prøv igen! 💛', 'wrong');
      // Reset display after shake finishes
      setTimeout(() => {
        if (!blocked) setAnswerDisplay('?', '');
      }, 380);
    }
  }

  function setFeedback(msg, cls) {
    const el = document.getElementById('feedbackMsg');
    el.textContent = msg;
    el.className   = cls;
  }

  // ═══════════════════════════════════════════
  // XP & LEVELS
  // ═══════════════════════════════════════════
  // Returns true if a level-up happened
  function awardXP(amount) {
    state.xp += amount;
    const cfg = getLevelCfg(state.level);
    if (state.xp >= cfg.xpNext && state.level < LEVELS.length - 1) {
      state.xp -= cfg.xpNext;
      state.level++;
      const newCfg = getLevelCfg(state.level);
      updateTopBar();
      saveState();
      showLevelUpModal(newCfg);
      return true;
    }
    return false;
  }

  function showLevelUpModal(cfg) {
    document.getElementById('levelUpContent').innerHTML = `
      <span class="modal-badge">${cfg.badge}</span>
      <div class="modal-title">Tillykke, ${PLAYER_NAME}! 🎉</div>
      <div class="modal-sub">Du er nu <strong>${cfg.name}</strong>!</div>
      <div class="modal-unlock">${cfg.unlockMsg}</div>
    `;
    document.getElementById('levelUpModal').style.display = 'flex';
  }

  function closeLevelUp() {
    document.getElementById('levelUpModal').style.display = 'none';
    advanceQuestion();
  }

  // ═══════════════════════════════════════════
  // TOP BAR
  // ═══════════════════════════════════════════
  function updateTopBar() {
    const cfg = getLevelCfg(state.level);
    const maxXp = cfg.xpNext;
    const pct   = maxXp < 999 ? Math.min(100, (state.xp / maxXp) * 100) : 100;
    document.getElementById('levelNameDisplay').textContent = `Niveau ${state.level} · ${cfg.name}`;
    document.getElementById('streakCount').textContent      = state.streak;
    document.getElementById('xpBarFill').style.width        = pct + '%';
    document.getElementById('xpLabel').textContent          =
      `Stjerner: ${state.xp} / ${maxXp < 999 ? maxXp : '∞'}`;
  }

  // ═══════════════════════════════════════════
  // KEYBOARD SUPPORT
  // ═══════════════════════════════════════════
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') {
      numpadPress(e.key);
    } else if (e.key === 'Backspace' || e.key === 'Delete') {
      numpadDelete();
    } else if (e.key === 'Enter') {
      checkAnswer();
    }
  });

  // ═══════════════════════════════════════════
  // BLACKBOARD
  // ═══════════════════════════════════════════
  const canvas = document.getElementById('blackboardCanvas');
  const ctx    = canvas.getContext('2d');
  let drawing  = false;

  function resizeCanvas() {
    if (!canvas.offsetParent && canvas.offsetWidth === 0) return;
    const saved = (canvas.width > 0 && canvas.height > 0)
      ? ctx.getImageData(0, 0, canvas.width, canvas.height)
      : null;
    canvas.width  = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    if (saved && canvas.width > 0 && canvas.height > 0) ctx.putImageData(saved, 0, 0);
  }

  function canvasPos(e) {
    const r  = canvas.getBoundingClientRect();
    const sx = canvas.width  / r.width;
    const sy = canvas.height / r.height;
    return { x: (e.clientX - r.left) * sx, y: (e.clientY - r.top) * sy };
  }

  canvas.addEventListener('pointerdown', e => {
    e.preventDefault();
    drawing = true;
    const p = canvasPos(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  });
  canvas.addEventListener('pointermove', e => {
    if (!drawing) return;
    e.preventDefault();
    const p = canvasPos(e);
    ctx.lineTo(p.x, p.y);
    ctx.strokeStyle = '#e8e8e8';
    ctx.lineWidth   = 4;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.stroke();
  });
  canvas.addEventListener('pointerup',  e => { e.preventDefault(); drawing = false; ctx.closePath(); });
  canvas.addEventListener('pointerout', e => { e.preventDefault(); drawing = false; ctx.closePath(); });
  window.addEventListener('resize', resizeCanvas);

  function clearBlackboard() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  // ═══════════════════════════════════════════
  // SERVICE WORKER
  // ═══════════════════════════════════════════
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(() => {});
    });
  }

  // ═══════════════════════════════════════════
  // INIT
  // ═══════════════════════════════════════════
  document.addEventListener('DOMContentLoaded', () => {
    loadState();
    resizeCanvas();
    updateTopBar();
    document.getElementById('correctCount').textContent   = state.correctTotal;
    document.getElementById('incorrectCount').textContent = state.incorrectTotal;
    advanceQuestion();
  });
  </script>
</body>
</html>
